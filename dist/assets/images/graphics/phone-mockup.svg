<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 600" width="320" height="600" role="img" aria-label="Booky reading app on a smartphone">
  <defs>
    <clipPath id="screen"><rect x="20" y="20" width="280" height="560" rx="26"/></clipPath>
  </defs>
  <!-- device body -->
  <rect x="6" y="6" width="308" height="588" rx="40" fill="#2b2722"/>
  <rect x="14" y="14" width="292" height="572" rx="32" fill="#f7f4ee"/>
  <g clip-path="url(#screen)">
    <!-- status / app bar -->
    <rect x="14" y="14" width="292" height="64" fill="#fdfcfa"/>
    <rect x="92" y="20" width="136" height="20" rx="10" fill="#2b2722"/>
    <text x="160" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#36302a">Booky</text>
    <!-- hero cover -->
    <rect x="40" y="98" width="160" height="240" rx="4" fill="#3a4a52"/>
    <text x="120" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#f1ede4">The Lantern</text>
    <text x="120" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#f1ede4">of Aldridge</text>
    <text x="120" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#f1ede4">Bay</text>
    <text x="120" y="312" text-anchor="middle" font-family="sans-serif" font-size="8" letter-spacing="2" fill="#c9a36a">ELEANOR FINCH</text>
    <!-- meta lines -->
    <rect x="216" y="104" width="64" height="10" rx="5" fill="#e4ded3"/>
    <rect x="216" y="124" width="48" height="8" rx="4" fill="#ece7dd"/>
    <rect x="216" y="150" width="64" height="8" rx="4" fill="#ece7dd"/>
    <rect x="216" y="166" width="56" height="8" rx="4" fill="#ece7dd"/>
    <rect x="216" y="182" width="60" height="8" rx="4" fill="#ece7dd"/>
    <circle cx="222" cy="222" r="6" fill="#c9a36a"/>
    <circle cx="240" cy="222" r="6" fill="#c9a36a"/>
    <circle cx="258" cy="222" r="6" fill="#c9a36a"/>
    <circle cx="276" cy="222" r="6" fill="#c9a36a"/>
    <circle cx="222" cy="222" r="6" fill="#c9a36a" opacity="0.35"/>
    <!-- now reading bar -->
    <rect x="40" y="372" width="240" height="64" rx="10" fill="#fdfcfa" stroke="#e4ded3"/>
    <rect x="52" y="384" width="28" height="40" rx="3" fill="#6a5a45"/>
    <rect x="92" y="390" width="120" height="9" rx="4" fill="#36302a"/>
    <rect x="92" y="408" width="80" height="7" rx="3" fill="#b3aa9c"/>
    <circle cx="256" cy="404" r="16" fill="#36302a"/>
    <path d="M251 396 l12 8 l-12 8 z" fill="#f7f4ee"/>
    <!-- progress -->
    <rect x="40" y="460" width="240" height="6" rx="3" fill="#e4ded3"/>
    <rect x="40" y="460" width="150" height="6" rx="3" fill="#c9a36a"/>
    <text x="40" y="486" font-family="sans-serif" font-size="9" fill="#8a8278">62% · 148 of 240 pages</text>
    <!-- tab bar -->
    <rect x="14" y="528" width="292" height="58" fill="#fdfcfa"/>
    <circle cx="80" cy="557" r="5" fill="#36302a"/>
    <circle cx="160" cy="557" r="5" fill="#c9a36a"/>
    <circle cx="240" cy="557" r="5" fill="#b3aa9c"/>
  </g>
</svg>
