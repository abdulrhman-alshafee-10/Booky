<body class="demo-library">
  <include src="base/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>

  <include src="layout/header.html"></include>

  <main id="main">

    <include src="heroes/hero-centered.html"></include>
    <include src="sections/how-it-works.html"></include>
    <include src="sections/popular-tabs.html"></include>
    <include src="sections/events-list.html"></include>
    <include src="sections/stats-counters.html"></include>

    <!-- S10 — Member stories (3-up bordered quote-cards) -->
    <section class="section section-deep" aria-labelledby="lib-members">
      <div class="container-main">
        <div class="section-head section-head--center">
          <span class="overline">From our members</span>
          <h2 id="lib-members">Stories from the club</h2>
        </div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-12">
          <figure class="quote-card">
            <blockquote>"I joined to read more and stayed for the people. My Tuesday club feels like the best part of my week."</blockquote>
            <figcaption class="quote-card-author">
              <span class="avatar" aria-hidden="true">RK</span>
              <span><span class="quote-card-name">Rosa Kovač</span><span class="quote-card-role">Member · Portland</span></span>
            </figcaption>
          </figure>
          <figure class="quote-card">
            <blockquote>"The monthly pick has pulled me out of every reading rut. I've discovered authors I'd never have found alone."</blockquote>
            <figcaption class="quote-card-author">
              <span class="avatar" aria-hidden="true">TM</span>
              <span><span class="quote-card-name">Théo Marchand</span><span class="quote-card-role">Member · Montréal</span></span>
            </figcaption>
          </figure>
          <figure class="quote-card">
            <blockquote>"A book club without the homework guilt. Read what you can, show up, talk. It's that simple, and it works."</blockquote>
            <figcaption class="quote-card-author">
              <span class="avatar" aria-hidden="true">AO</span>
              <span><span class="quote-card-name">Amara Okafor</span><span class="quote-card-role">Member · Leeds</span></span>
            </figcaption>
          </figure>
        </div>
      </div>
    </section>

    <include src="sections/trust-strip.html"></include>
    <include src="sections/newsletter-band.html"></include>
