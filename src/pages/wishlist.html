<!doctype html>
<html lang="en" dir="ltr">
<head>
  <include src="base/head.html"></include>

  <title>Your Wishlist – Booky</title>
  <meta name="description" content="Books you've saved for later. Add them to your cart whenever you're ready.">
  <link rel="canonical" href="https://booky.example.com/wishlist.html">
  <meta property="og:title" content="Your Wishlist – Booky">
  <meta property="og:description" content="View your saved books on Booky.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://booky.example.com/wishlist.html">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>
  <include src="headers/header-1.html"></include>

  <main id="main">
    <!-- Page header -->
    <section class="bg-surface-2 border-b border-border">
      <div class="container-app shop-page-header">
        <nav aria-label="Breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item" aria-current="page">Wishlist</li>
          </ol>
        </nav>
        <h1 class="shop-page-title mt-3">Your Wishlist</h1>
        <p class="text-text-muted mt-2">Books you've saved for later — <span data-wishlist-count>0</span> title(s).</p>
      </div>
    </section>

    <section class="section-y">
      <div class="container-app">
        <!-- Empty state -->
        <div class="text-center py-24" data-wishlist-empty hidden>
          <svg class="w-20 h-20 text-text-muted mx-auto mb-6 opacity-30" aria-hidden="true" focusable="false"><use href="#icon-wishlist"></use></svg>
          <h2 class="font-heading text-2xl font-bold">Your wishlist is empty</h2>
          <p class="text-text-muted mt-2">Save books you love to come back to them later.</p>
          <a href="shop.html" class="btn btn-primary btn-lg mt-8">Discover Books</a>
        </div>

        <!-- Wishlist grid -->
        <div class="wishlist-grid" data-wishlist-grid>
          <!-- Rendered by wishlist.js -->
        </div>

        <div class="flex justify-end mt-8" data-wishlist-actions>
          <button class="btn btn-ghost btn-sm text-danger" data-clear-list="wishlist">
            <svg aria-hidden="true" focusable="false"><use href="#icon-trash"></use></svg> Clear wishlist
          </button>
        </div>
      </div>
    </section>
  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/quickview.html"></include>
  <include src="base/scripts.html"></include>
</body>
</html>
