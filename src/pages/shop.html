<!doctype html>
<html lang="en" dir="ltr">
<head>
  <include src="base/head.html"></include>

  <title>Shop All Books – Booky</title>
  <meta name="description" content="Browse the full Booky catalogue. Filter by genre, format, price and rating, then sort to find your next great read across fiction, non-fiction, poetry and more.">
  <link rel="canonical" href="https://booky.example.com/shop.html">
  <meta property="og:title" content="Shop All Books – Booky">
  <meta property="og:description" content="Filter, sort and discover thousands of handpicked titles at Booky.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://booky.example.com/shop.html">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>
  <include src="headers/header-1.html"></include>

  <main id="main">
    <!-- Page header -->
    <section class="bg-surface-2 border-b border-border">
      <div class="container-app shop-page-header">
        <nav aria-label="Breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item" aria-current="page">Shop</li>
          </ol>
        </nav>
        <h1 class="shop-page-title mt-3">All Books</h1>
        <p class="text-text-muted mt-2 max-w-2xl">Every title on our shelves, in one place. Use the filters to narrow by genre, format, price and rating — or just browse and let something find you.</p>
      </div>
    </section>

    <!-- Shop -->
    <section class="section-y">
      <div class="container-app">
        <!-- Filter drawer (off-canvas on every breakpoint for this no-sidebar layout) -->
        <include src="base/shop-sidebar.html"></include>

        <div data-shop data-cols="4" data-default-view="grid">
          <include src="base/shop-toolbar.html"></include>
          <div class="shop-active-filters mt-4" data-active-filters hidden></div>
          <div class="mt-6">
            <include src="base/shop-products.html"></include>
          </div>
          <include src="base/shop-pagination.html"></include>
        </div>
      </div>
    </section>
  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/quickview.html"></include>
  <include src="base/scripts.html"></include>
</body>
</html>
