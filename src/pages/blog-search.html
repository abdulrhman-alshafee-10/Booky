<!doctype html>
<html lang="en" dir="ltr">
<head>
  <include src="base/head.html"></include>
  <title>Search Results – Booky Journal</title>
  <meta name="description" content="Search the Booky Journal for reading lists, author interviews, staff picks and editorial essays.">
  <link rel="canonical" href="https://booky.example.com/blog-search.html">
  <meta property="og:title" content="Search – Booky Journal">
  <meta property="og:description" content="Search the Booky Journal for reading lists, author interviews, staff picks and editorial essays.">
  <meta property="og:url" content="https://booky.example.com/blog-search.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Search – Booky Journal">
  <meta name="twitter:description" content="Search the Booky Journal for reading lists, author interviews, staff picks and editorial essays.">
</head>
<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>
  <include src="headers/header-1.html"></include>

  <main id="main">

    <!-- Search header -->
    <div class="bg-surface-2 border-b border-border">
      <div class="container-app py-10 max-w-2xl">
        <nav aria-label="Breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item"><a href="blog.html">Journal</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item" aria-current="page">Search</li>
          </ol>
        </nav>

        <h1 class="font-heading text-3xl font-black mt-4 tracking-tight">Search the Journal</h1>

        <!-- Search field (large) -->
        <div class="mt-6">
          <label class="sr-only" for="blog-search-hero">Search articles</label>
          <div class="relative">
            <span class="absolute inset-y-0 start-4 flex items-center pointer-events-none text-text-muted" aria-hidden="true">
              <svg class="w-5 h-5" aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg>
            </span>
            <input
              class="search-field-lg ps-12"
              type="search"
              id="blog-search-hero"
              name="q"
              placeholder="Search articles, authors, topics…"
              autocomplete="off"
              aria-label="Search articles"
              data-blog-search
            >
          </div>
        </div>

        <!-- Results summary -->
        <p class="mt-4 text-sm text-text-muted" aria-live="polite" aria-atomic="true">
          Showing <strong data-count-shown>6</strong> of <strong data-count-total>12</strong> articles
        </p>
      </div>
    </div>

    <!-- Blog listing -->
    <section class="section-y" data-blog>
      <div class="container-app">
        <include src="blog/toolbar.html"></include>

        <div class="blog-layout has-sidebar-end mt-2">

          <!-- Posts grid -->
          <div>
            <include src="blog/posts.html"></include>
          </div>

          <!-- Sidebar -->
          <include src="blog/sidebar.html"></include>

        </div>
      </div>
    </section>

  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/quickview.html"></include>
  <include src="base/scripts.html"></include>
</body>
</html>
