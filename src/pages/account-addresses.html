<!doctype html>
<html lang="en" dir="ltr">
<head>
  <include src="base/head.html"></include>

  <title>My Addresses – Booky</title>
  <meta name="description" content="Manage your billing and shipping addresses on Booky. Add, edit or remove saved addresses.">
  <link rel="canonical" href="https://booky.example.com/account-addresses.html">
  <meta property="og:title" content="My Addresses – Booky">
  <meta property="og:description" content="Manage your Booky delivery and billing addresses.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://booky.example.com/account-addresses.html">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>
  <include src="headers/header-1.html"></include>

  <main id="main">
    <div class="bg-surface-2 border-b border-border">
      <div class="container-app py-4">
        <nav aria-label="Breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item"><a href="account-dashboard.html">My Account</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item" aria-current="page">Addresses</li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="section-y">
      <div class="container-app">
        <div class="account-layout">
          <include src="account/account-sidebar.html"></include>

          <div class="account-layout-main">
            <div class="flex items-center justify-between mb-6">
              <h1 class="font-heading text-2xl font-bold">My Addresses</h1>
              <button class="btn btn-primary btn-sm" data-add-address>
                <svg aria-hidden="true" focusable="false"><use href="#icon-plus"></use></svg> Add address
              </button>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
              <!-- Default billing address -->
              <div class="address-card">
                <div class="address-card-header">
                  <h2 class="address-card-title">Billing Address</h2>
                  <span class="badge badge-primary">Default</span>
                </div>
                <address class="address-card-body not-italic">
                  Abdulrhman Al-Shafee<br>
                  42 Aldridge Street<br>
                  London, W1B 2EE<br>
                  United Kingdom
                </address>
                <div class="address-card-actions">
                  <button class="btn btn-ghost btn-sm" data-edit-address>
                    <svg aria-hidden="true" focusable="false"><use href="#icon-edit"></use></svg> Edit
                  </button>
                  <button class="btn btn-ghost btn-sm text-danger" data-delete-address aria-label="Delete billing address">
                    <svg aria-hidden="true" focusable="false"><use href="#icon-trash"></use></svg> Delete
                  </button>
                </div>
              </div>

              <!-- Shipping address -->
              <div class="address-card">
                <div class="address-card-header">
                  <h2 class="address-card-title">Shipping Address</h2>
                </div>
                <address class="address-card-body not-italic">
                  Abdulrhman Al-Shafee<br>
                  7 Coastal View, Apt 3<br>
                  Brighton, BN1 4GQ<br>
                  United Kingdom
                </address>
                <div class="address-card-actions">
                  <button class="btn btn-ghost btn-sm" data-edit-address>
                    <svg aria-hidden="true" focusable="false"><use href="#icon-edit"></use></svg> Edit
                  </button>
                  <button class="btn btn-ghost btn-sm text-danger" data-delete-address aria-label="Delete shipping address">
                    <svg aria-hidden="true" focusable="false"><use href="#icon-trash"></use></svg> Delete
                  </button>
                </div>
              </div>
            </div>

            <!-- Address modal -->
            <div class="modal-overlay" id="address-modal" role="dialog" aria-modal="true" aria-labelledby="address-modal-title">
              <div class="modal-box">
                <button class="modal-close absolute end-3 top-3" data-modal-close aria-label="Close">
                  <svg aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
                </button>
                <h2 class="font-heading text-xl font-bold mb-5" id="address-modal-title">Address</h2>
                <form data-address-form novalidate>
                  <div class="grid sm:grid-cols-2 gap-4">
                    <div>
                      <label for="addr-fname" class="form-label">First name <span aria-hidden="true">*</span></label>
                      <input id="addr-fname" type="text" class="input-field" data-rule="required|min:2" autocomplete="given-name">
                    </div>
                    <div>
                      <label for="addr-lname" class="form-label">Last name <span aria-hidden="true">*</span></label>
                      <input id="addr-lname" type="text" class="input-field" data-rule="required|min:2" autocomplete="family-name">
                    </div>
                  </div>
                  <div class="mt-4">
                    <label for="addr-street" class="form-label">Street address <span aria-hidden="true">*</span></label>
                    <input id="addr-street" type="text" class="input-field" data-rule="required" autocomplete="street-address">
                  </div>
                  <div class="grid sm:grid-cols-2 gap-4 mt-4">
                    <div>
                      <label for="addr-city" class="form-label">City <span aria-hidden="true">*</span></label>
                      <input id="addr-city" type="text" class="input-field" data-rule="required" autocomplete="address-level2">
                    </div>
                    <div>
                      <label for="addr-postcode" class="form-label">Postcode <span aria-hidden="true">*</span></label>
                      <input id="addr-postcode" type="text" class="input-field" data-rule="required" autocomplete="postal-code">
                    </div>
                  </div>
                  <div class="mt-4">
                    <label for="addr-country" class="form-label">Country <span aria-hidden="true">*</span></label>
                    <select id="addr-country" class="select-field" data-rule="required" autocomplete="country">
                      <option value="">Select a country</option>
                      <option value="GB">United Kingdom</option>
                      <option value="US">United States</option>
                      <option value="CA">Canada</option>
                      <option value="AU">Australia</option>
                    </select>
                  </div>
                  <div class="flex gap-3 mt-6">
                    <button type="submit" class="btn btn-primary flex-1">Save address</button>
                    <button type="button" class="btn btn-outline" data-modal-close>Cancel</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/scripts.html"></include>
</body>
</html>
