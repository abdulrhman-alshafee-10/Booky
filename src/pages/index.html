  <link rel="canonical" href="https://booky.example.com/index.html">

  <meta property="og:title" content="Booky — The Independent Bookshop, Online">
  <meta property="og:description" content="20,000+ handpicked titles, free shipping over $35, curated by readers who love books.">
  <meta property="og:image" content="assets/images/og-cover.jpg">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "name": "Booky",
        "url": "https://booky.example.com/",
        "logo": "https://booky.example.com/assets/favicons/icon.svg",
        "sameAs": [
          "https://facebook.com/booky",
          "https://instagram.com/booky",
          "https://twitter.com/booky"
        ]
      },
      {
        "@type": "WebSite",
        "name": "Booky",
        "url": "https://booky.example.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://booky.example.com/shop.html?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>
