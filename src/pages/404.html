<!doctype html>
<html lang="en" dir="ltr">
<head>
  <include src="base/head.html"></include>
  <title>Page Not Found — 404 | Booky</title>
  <meta name="description" content="The page you were looking for doesn't exist. Let's find you something great to read instead.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://booky.example.com/404.html">
</head>
<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>
  <include src="headers/header-1.html"></include>

  <main id="main" class="flex-1">
    <div class="error-page">
      <div class="container-app">
        <div class="max-w-xl mx-auto text-center">
          <p class="error-code" aria-hidden="true">404</p>
          <h1 class="error-title">Page not found.</h1>
          <p class="error-desc">The page you were looking for doesn't exist or may have moved. Let's find you something great to read instead.</p>

          <!-- Quick search -->
          <div class="max-w-sm mx-auto mb-8">
            <form action="shop.html" method="get" role="search" aria-label="Search books">
              <label for="error-search" class="sr-only">Search books</label>
              <div class="relative">
                <span class="input-icon-start"><svg aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg></span>
                <input
                  id="error-search"
                  type="search"
                  name="q"
                  class="input-field !ps-10 !py-3"
                  placeholder="Search for a book…"
                  autocomplete="off"
                >
              </div>
            </form>
          </div>

          <div class="error-actions">
            <a href="index.html" class="btn btn-primary btn-lg">Go to homepage</a>
            <a href="shop.html" class="btn btn-outline btn-lg">Browse all books</a>
          </div>

          <!-- Quick links -->
          <nav class="mt-10" aria-label="Helpful links">
            <p class="text-sm font-semibold text-text-muted mb-3">Quick links</p>
            <ul class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm">
              <li><a href="account-orders.html" class="text-primary hover:underline">Track your order</a></li>
              <li><a href="faq.html" class="text-primary hover:underline">Help &amp; FAQ</a></li>
              <li><a href="contact.html" class="text-primary hover:underline">Contact us</a></li>
              <li><a href="shop.html" class="text-primary hover:underline">New arrivals</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/quickview.html"></include>
  <include src="base/scripts.html"></include>
</body>
</html>
