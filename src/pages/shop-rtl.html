<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <include src="base/head.html"></include>

  <title>تسوق جميع الكتب – بوكي</title>
  <meta name="description" content="تصفح كامل كتالوج بوكي. فلتر حسب النوع الأدبي والتنسيق والسعر والتقييم، ثم رتب للعثور على قراءتك التالية عبر الروايات والأدب الراقي والشعر والمزيد.">
  <link rel="canonical" href="https://booky.example.com/shop-rtl.html">
  <meta property="og:title" content="تسوق جميع الكتب – بوكي">
  <meta property="og:description" content="فلتر واكتشف آلاف العناوين المختارة في بوكي.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://booky.example.com/shop-rtl.html">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">الانتقال إلى المحتوى</a>

  <!-- RTL demo notice -->
  <div class="bg-secondary text-text-on-dark text-sm py-2 px-4 text-center" role="note" dir="rtl">
    <span>هذه صفحة عرض توضيحي للغة العربية (RTL) — </span>
    <span dir="ltr" class="inline-block">Right-to-Left Demo Page</span>
    <span> — </span>
    <button type="button" data-rtl-toggle class="underline hover:no-underline font-medium ms-2" aria-pressed="true">
      <span data-rtl-label>LTR</span>
    </button>
  </div>

  <include src="headers/header-1.html"></include>

  <main id="main">
    <!-- Page header -->
    <section class="bg-surface-2 border-b border-border">
      <div class="container-app shop-page-header">
        <nav aria-label="مسار التنقل">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index-rtl.html">الرئيسية</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item" aria-current="page">المتجر</li>
          </ol>
        </nav>
        <h1 class="shop-page-title mt-3">جميع الكتب</h1>
        <p class="text-text-muted mt-2 max-w-2xl">كل عنوان على رفوفنا في مكان واحد. استخدم الفلاتر لتضييق النتائج حسب النوع الأدبي والتنسيق والسعر والتقييم — أو تصفح فقط ودع شيئًا يجذب انتباهك.</p>
      </div>
    </section>

    <!-- Shop -->
    <section class="section-y">
      <div class="container-app">
        <!-- Filter drawer -->
        <include src="shop/sidebar.html"></include>

        <div data-shop data-cols="4" data-default-view="grid">
          <include src="shop/toolbar.html"></include>
          <div class="shop-active-filters mt-4" data-active-filters hidden></div>
          <div class="mt-6">
            <include src="shop/products.html"></include>
          </div>
          <include src="shop/pagination.html"></include>
        </div>
      </div>
    </section>
  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/quickview.html"></include>
  <include src="base/scripts.html"></include>

</html>
