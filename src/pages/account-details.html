<!doctype html>
<html lang="en" dir="ltr">
<head>
  <include src="base/head.html"></include>

  <title>Account Details – Booky</title>
  <meta name="description" content="Update your Booky account name, email address and password.">
  <link rel="canonical" href="https://booky.example.com/account-details.html">
  <meta property="og:title" content="Account Details – Booky">
  <meta property="og:description" content="Manage your Booky account details.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://booky.example.com/account-details.html">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body class="flex flex-col min-h-dvh">
  <include src="icons/icons.html"></include>
  <a class="skip-link" href="#main">Skip to content</a>
  <include src="headers/header-1.html"></include>

  <main id="main">
    <div class="bg-surface-2 border-b border-border">
      <div class="container-app py-4">
        <nav aria-label="Breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item"><a href="account-dashboard.html">My Account</a></li>
            <li class="breadcrumb-sep" aria-hidden="true"><svg focusable="false"><use href="#icon-chevron-right"></use></svg></li>
            <li class="breadcrumb-item" aria-current="page">Account Details</li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="section-y">
      <div class="container-app">
        <div class="account-layout">
          <include src="account/account-sidebar.html"></include>

          <div class="account-layout-main">
            <h1 class="font-heading text-2xl font-bold mb-6">Account Details</h1>

            <form data-account-details-form novalidate class="max-w-lg">
              <!-- Name -->
              <div class="grid sm:grid-cols-2 gap-4">
                <div>
                  <label for="details-fname" class="form-label">First name <span aria-hidden="true">*</span></label>
                  <input id="details-fname" type="text" class="input-field" data-rule="required|min:2" value="Abdulrhman" autocomplete="given-name">
                </div>
                <div>
                  <label for="details-lname" class="form-label">Last name <span aria-hidden="true">*</span></label>
                  <input id="details-lname" type="text" class="input-field" data-rule="required|min:2" value="Al-Shafee" autocomplete="family-name">
                </div>
              </div>

              <!-- Display name -->
              <div class="mt-4">
                <label for="details-display-name" class="form-label">Display name</label>
                <input id="details-display-name" type="text" class="input-field" value="Abdulrhman" autocomplete="nickname">
                <p class="text-xs text-text-muted mt-1">This will appear on your reviews and account pages.</p>
              </div>

              <!-- Email -->
              <div class="mt-4">
                <label for="details-email" class="form-label">Email address <span aria-hidden="true">*</span></label>
                <input id="details-email" type="email" class="input-field" data-rule="required|email" value="aulshafee@gmail.com" autocomplete="email">
              </div>

              <hr class="border-border my-6">
              <h2 class="font-heading font-semibold text-lg mb-4">Change Password</h2>
              <p class="text-sm text-text-muted mb-4">Leave blank to keep your current password.</p>

              <div class="mt-4">
                <label for="current-password" class="form-label">Current password</label>
                <input id="current-password" type="password" class="input-field" autocomplete="current-password">
              </div>
              <div class="mt-4">
                <label for="new-password" class="form-label">New password</label>
                <input id="new-password" type="password" class="input-field" data-rule="min:8" autocomplete="new-password">
              </div>
              <div class="mt-4">
                <label for="confirm-password" class="form-label">Confirm new password</label>
                <input id="confirm-password" type="password" class="input-field" autocomplete="new-password">
              </div>

              <button type="submit" class="btn btn-primary btn-lg mt-8">Save changes</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <include src="footers/footer-1.html"></include>
  <include src="base/mini-cart.html"></include>
  <include src="base/scripts.html"></include>
</body>
</html>
