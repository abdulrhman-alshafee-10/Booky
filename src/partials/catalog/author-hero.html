<!-- ===== Author hero / profile header ===== -->
<section class="author-hero">
  <div class="container-app">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
      <!-- Avatar -->
      <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full bg-primary/10 flex items-center justify-center font-bold text-primary text-5xl shrink-0" aria-hidden="true">E</div>
      <!-- Info -->
      <div class="flex-1">
        <p class="text-sm font-semibold text-text-muted uppercase tracking-wide">Author</p>
        <h1 class="font-heading text-3xl md:text-4xl font-bold mt-1">Eleanor Finch</h1>
        <p class="text-text-muted mt-2 max-w-2xl">Award-winning author of literary fiction. Born in Cornwall, studied at Oxford. Her debut novel <em>The Lantern of Aldridge Bay</em> was longlisted for the Booker Prize and shortlisted for the Costa First Novel Award.</p>
        <div class="flex flex-wrap items-center gap-4 mt-4 text-sm text-text-muted">
          <span><strong class="text-text">4</strong> books</span>
          <span><strong class="text-text">18,000+</strong> readers</span>
          <span class="badge badge-secondary">Literary Fiction</span>
        </div>
      </div>
      <!-- Follow btn -->
      <div class="shrink-0">
        <button class="btn btn-outline">Follow author</button>
      </div>
    </div>
  </div>
</section>
