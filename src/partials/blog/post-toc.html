<!-- ============================================================
     POST TOC — reading-progress bar + table of contents.
     toc.js auto-populates [data-toc-list] from .prose h2/.h3 headings.
     The .toc-float wrapper floats sticky at xl+ (set in CSS).
============================================================ -->

<!-- Reading progress bar (fixed, top of viewport) -->
<div class="read-progress" id="read-progress" aria-hidden="true" role="presentation"></div>

<!-- Floating TOC (visible at xl+; inside post layout for sidebar pages) -->
<aside class="toc-float" aria-label="On this page">
  <nav class="toc" id="post-toc">
    <p class="toc-title">On this page</p>
    <ol class="toc-list" data-toc-list>
      <!-- auto-populated by toc.js -->
    </ol>
  </nav>
</aside>
