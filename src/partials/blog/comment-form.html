<!-- ============================================================
     COMMENT FORM — validated reply form; reuses form-validate.js.
     data-form="comment" triggers initFormValidate() in form-validate.js.
============================================================ -->
<section class="comment-form border-t border-border pt-10" aria-labelledby="comment-form-heading">

  <h2 id="comment-form-heading" class="comment-form-title">Leave a comment</h2>

  <!-- Inline success state (hidden until JS shows it) -->
  <div class="comment-form-success hidden" role="alert" aria-live="polite" aria-atomic="true">
    <svg class="w-5 h-5 text-success" aria-hidden="true" focusable="false"><use href="#icon-check-circle"></use></svg>
    <p>Thanks for your comment! It's awaiting moderation and will appear shortly.</p>
  </div>

  <form
    class="mt-6"
    data-form="comment"
    novalidate
    aria-label="Comment submission form"
  >
    <!-- Name + Email row -->
    <div class="comment-form-grid">

      <div class="form-group">
        <label class="form-label" for="comment-name">
          Name <span class="text-danger" aria-hidden="true">*</span>
          <span class="sr-only">(required)</span>
        </label>
        <input
          class="form-input"
          type="text"
          id="comment-name"
          name="name"
          autocomplete="name"
          required
          minlength="2"
          aria-required="true"
          aria-describedby="comment-name-error"
          placeholder="Your name"
        >
        <p class="form-error hidden" id="comment-name-error" role="alert"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="comment-email">
          Email <span class="text-danger" aria-hidden="true">*</span>
          <span class="sr-only">(required)</span>
        </label>
        <input
          class="form-input"
          type="email"
          id="comment-email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="comment-email-error"
          placeholder="your@email.com"
        >
        <p class="form-error hidden" id="comment-email-error" role="alert"></p>
      </div>

    </div>

    <!-- Website (optional) -->
    <div class="form-group mt-4">
      <label class="form-label" for="comment-website">Website <span class="text-text-muted text-xs">(optional)</span></label>
      <input
        class="form-input"
        type="url"
        id="comment-website"
        name="website"
        autocomplete="url"
        placeholder="https://yoursite.com"
        aria-describedby="comment-website-error"
      >
      <p class="form-error hidden" id="comment-website-error" role="alert"></p>
    </div>

    <!-- Comment textarea -->
    <div class="form-group mt-4">
      <label class="form-label" for="comment-body">
        Comment <span class="text-danger" aria-hidden="true">*</span>
        <span class="sr-only">(required)</span>
      </label>
      <textarea
        class="form-input"
        id="comment-body"
        name="comment"
        rows="5"
        required
        minlength="10"
        aria-required="true"
        aria-describedby="comment-body-error"
        placeholder="Share your thoughts…"
      ></textarea>
      <p class="form-error hidden" id="comment-body-error" role="alert"></p>
    </div>

    <!-- Save info checkbox -->
    <div class="form-group mt-4 flex items-start gap-3">
      <input
        class="form-checkbox mt-0.5"
        type="checkbox"
        id="comment-save-info"
        name="saveInfo"
        aria-describedby="comment-save-info-desc"
      >
      <label class="form-label !mb-0 font-normal cursor-pointer" for="comment-save-info" id="comment-save-info-desc">
        Save my name and email for the next time I comment.
      </label>
    </div>

    <!-- Submit -->
    <div class="mt-6">
      <button type="submit" class="btn btn-primary">
        Post comment
        <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-arrow-right"></use></svg>
      </button>
    </div>

  </form>

</section>
