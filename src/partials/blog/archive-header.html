<!-- ============================================================
     ARCHIVE HEADER — reusable banner for category / search / tag archives.
     Expected context data attributes on the containing element:
       data-archive-eyebrow  → "Category" / "Search results for" / "Tag"
       data-archive-title    → archive name (e.g. "Fiction")
       data-archive-desc     → optional description sentence
       data-archive-count    → total post count (populated by blog.js)
     These are set via JS or server-render; fallbacks shown below for static demo.
============================================================ -->
<div class="archive-header">
  <p class="archive-header-eyebrow" data-archive-eyebrow>Category</p>
  <h1 class="archive-header-title" data-archive-title>Fiction</h1>
  <p class="archive-header-desc" data-archive-desc>
    Stories, novels, and editorial picks from the world of literary and commercial fiction.
  </p>
  <p class="archive-header-count">
    Showing <strong data-archive-count>12</strong> articles
  </p>
</div>
