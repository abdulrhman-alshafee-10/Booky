<!-- ============================================================
     POST SHARE + TAGS ROW — share buttons and tag list.
     Reused both below the hero image and after post body.
============================================================ -->
<div class="share-row" role="group" aria-label="Share and tags">

  <!-- Share buttons -->
  <div class="flex items-center gap-2 flex-wrap">
    <span class="share-row-label">Share:</span>

    <a href="https://twitter.com/intent/tweet?url=https%3A%2F%2Fbooky.example.com%2Fblog-single.html&text=10+Books+That+Will+Change+the+Way+You+See+the+World"
       class="btn btn-outline btn-sm gap-1.5"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="Share on Twitter / X">
      <svg class="w-3.5 h-3.5" aria-hidden="true" focusable="false"><use href="#icon-twitter"></use></svg>
      <span class="sr-only">Twitter</span>
      <span aria-hidden="true">Twitter</span>
    </a>

    <a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fbooky.example.com%2Fblog-single.html"
       class="btn btn-outline btn-sm gap-1.5"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="Share on Facebook">
      <svg class="w-3.5 h-3.5" aria-hidden="true" focusable="false"><use href="#icon-facebook"></use></svg>
      <span class="sr-only">Facebook</span>
      <span aria-hidden="true">Facebook</span>
    </a>

    <button type="button"
            class="btn btn-outline btn-sm gap-1.5"
            data-copy-link="https://booky.example.com/blog-single.html"
            aria-label="Copy link to clipboard">
      <svg class="w-3.5 h-3.5" aria-hidden="true" focusable="false"><use href="#icon-link"></use></svg>
      <span>Copy link</span>
    </button>
  </div>

  <!-- Tags -->
  <ul class="tag-list" aria-label="Post tags">
    <li><a href="blog-category.html?cat=fiction" class="filter-chip" data-blog-tag="fiction">Fiction</a></li>
    <li><a href="blog-category.html?cat=reading-lists" class="filter-chip" data-blog-tag="reading-lists">Reading Lists</a></li>
    <li><a href="blog-category.html?cat=editorial" class="filter-chip" data-blog-tag="editorial">Editorial</a></li>
  </ul>

</div>
