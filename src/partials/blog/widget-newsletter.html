<!-- Sidebar widget — mini newsletter (validated via forms.js). -->
<div class="widget">
  <h2 class="widget-title">The weekly read</h2>
  <p class="text-sm text-ink-soft">One thoughtful email a week — new arrivals, staff picks, the odd essay.</p>
  <form data-newsletter class="mt-4">
    <div class="field">
      <div class="newsletter-inline">
        <label class="sr-only" for="blog-news-email">Email address</label>
        <input id="blog-news-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        <button class="btn-link" type="submit" aria-label="Subscribe"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-arrow-right"></use></svg></button>
      </div>
    </div>
  </form>
</div>
