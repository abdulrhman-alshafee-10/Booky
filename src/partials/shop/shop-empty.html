<!-- No-results empty state. Shown by shop.js when a filter set matches
     nothing; the Clear-filters button resets everything. -->
<div class="shop-empty" data-shop-empty hidden>
  <div class="empty-state">
    <svg class="icon" aria-hidden="true"><use href="#i-search"></use></svg>
    <p class="empty-state-title">No books match those filters</p>
    <p>Try widening your price range or clearing a filter or two.</p>
    <button class="btn" type="button" data-clear-filters>Clear all filters</button>
  </div>
</div>
