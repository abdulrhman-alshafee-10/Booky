<!-- ============================================================
     CARD — Book (grid/carousel default)
     The canonical grid card. Slots: cover · badges · actions
     category · title · author · price · rating · quick-add.
     Copy this snippet and fill in demo data per item.
     Class names are canonical — a single CSS change restyles all instances.
============================================================ -->
<article class="book-card">

  <!-- Cover image area -->
  <div class="book-card-image">
    <div class="cover-art cover-1">
      <span class="cover-art-publisher">Booky Press</span>
      <div>
        <hr class="cover-art-rule">
        <p class="cover-art-title">The Lantern of Aldridge Bay</p>
        <p class="cover-art-author">by Eleanor Finch</p>
      </div>
    </div>

    <!-- Badges (top-start) -->
    <div class="book-card-badges">
      <span class="badge badge-bestseller">Bestseller</span>
    </div>

    <!-- Hover actions (top-end) -->
    <div class="book-card-actions" aria-hidden="true">
      <button
        class="btn btn-icon btn-sm bg-surface-2 hover:bg-primary hover:text-white border border-border shadow-sm"
        tabindex="-1"
        aria-label="Add to wishlist: The Lantern of Aldridge Bay"
      >
        <svg aria-hidden="true" focusable="false"><use href="#icon-wishlist"></use></svg>
      </button>
      <button
        class="btn btn-icon btn-sm bg-surface-2 hover:bg-primary hover:text-white border border-border shadow-sm"
        tabindex="-1"
        aria-label="Quick view: The Lantern of Aldridge Bay"
        data-quickview-open
      >
        <svg aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg>
      </button>
    </div>

    <!-- Quick-add (bottom overlay) -->
    <div class="book-card-quick-add">
      <button
        class="btn btn-primary btn-sm btn-full"
        tabindex="-1"
        aria-label="Add The Lantern of Aldridge Bay to cart"
      >
        <svg aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg>
        Quick add
      </button>
    </div>
  </div>

  <!-- Card body -->
  <div class="book-card-body">
    <a href="shop.html" class="book-card-category">Fiction</a>
    <a href="shop.html" class="book-card-title">The Lantern of Aldridge Bay</a>
    <a href="shop.html" class="book-card-author">Eleanor Finch</a>

    <!-- Rating -->
    <div class="flex items-center gap-1.5 mt-1">
      <div class="rating" aria-label="Rated 4.9 of 5">
        <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
        <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
        <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
        <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
        <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
      </div>
      <span class="text-xs text-text-muted">(4.9)</span>
    </div>

    <!-- Price -->
    <div class="book-card-footer">
      <div class="price-group">
        <span class="price text-lg">$12.99</span>
        <span class="price-original">$18.99</span>
      </div>
      <button class="btn btn-primary btn-sm" aria-label="Add The Lantern of Aldridge Bay to cart">
        <svg aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg>
      </button>
    </div>
  </div>

</article>
