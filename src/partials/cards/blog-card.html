============================================================ -->
<article class="blog-card">

  <!-- Cover image (16/9) -->
  <a href="blog.html" class="blog-card-image block" aria-hidden="true" tabindex="-1">

      <span class="cover-art-publisher">Booky Journal</span>
      <div>
        <hr class="cover-art-rule">
        <p class="cover-art-title">Summer Reading</p>

    </div>

  <div class="blog-card-body">
    <div class="blog-card-meta">
      <span>Fiction</span>
      <span aria-hidden="true">&middot;</span>
      <time datetime="2026-06-01">June 1, 2026</time>
      <span aria-hidden="true">&middot;</span>
      <span>5 min read</span>
    </div>

    <a href="blog.html" class="blog-card-title">10 Summer Reads That Will Change the Way You See the World</a>

    <p class="blog-card-excerpt">
      From sweeping literary fiction to thought-provoking non-fiction, these are the books our editors can't stop talking about this season.
    </p>

    <a href="blog.html" class="btn btn-ghost btn-sm !px-0 mt-auto self-start text-primary">
      Read article
      <svg class="w-3.5 h-3.5" aria-hidden="true" focusable="false"><use href="#icon-chevron-right"></use></svg>

</article>
