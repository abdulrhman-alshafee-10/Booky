<!-- ============================================================
     CARD — Book Compact (minimal)
     Small cover + title + price only.
     Used in: ranked lists, mini-carts, "recently viewed", sidebar widgets.
     Copy and fill per item.
============================================================ -->
<a href="shop.html" class="flex items-center gap-3 py-2.5 hover:bg-surface-3 -mx-2 px-2 rounded-btn transition-colors group">

  <!-- Tiny cover -->
  <div class="w-9 h-12 rounded overflow-hidden shrink-0 shadow-xs">
    <div class="cover-art cover-7 h-full">
      <span class="sr-only">Book cover: Salt &amp; Starlight</span>
    </div>
  </div>

  <!-- Info -->
  <div class="flex-1 min-w-0">
    <p class="text-sm font-semibold text-text group-hover:text-primary transition-colors leading-snug line-clamp-2">Salt &amp; Starlight</p>
    <p class="text-xs text-text-muted mt-0.5">Marenne Vale</p>
  </div>

  <!-- Price -->
  <div class="shrink-0 text-end">
    <p class="text-sm font-bold text-text">$9.99</p>
    <p class="text-xs text-text-subtle line-through">$14.99</p>
  </div>

</a>
