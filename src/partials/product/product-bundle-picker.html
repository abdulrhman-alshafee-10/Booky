<!-- ===== Bundle picker ===== -->
<section class="mt-16">
  <h2 class="font-heading text-2xl font-bold mb-6">Frequently bought together</h2>
  <div class="bundle-component">
    <!-- Book 1 (this product) -->
    <label class="bundle-item">
      <input type="checkbox" name="bundle" value="bk-01" checked aria-label="Include The Lantern of Aldridge Bay">
      <div class="w-24 rounded overflow-hidden"><div class="cover-art cover-1" style="aspect-ratio:2/3"></div></div>
      <div class="bundle-item-info">
        <p class="bundle-item-title">The Lantern of Aldridge Bay</p>
        <p class="bundle-item-author">Eleanor Finch</p>
        <p class="price">$16.99</p>
      </div>
    </label>

    <div class="bundle-plus" aria-hidden="true">+</div>

    <!-- Book 2 -->
    <label class="bundle-item">
      <input type="checkbox" name="bundle" value="bk-03" checked aria-label="Include Salt &amp; Starlight">
      <div class="w-24 rounded overflow-hidden"><div class="cover-art cover-3" style="aspect-ratio:2/3"></div></div>
      <div class="bundle-item-info">
        <p class="bundle-item-title">Salt &amp; Starlight</p>
        <p class="bundle-item-author">Moira Blackwell</p>
        <p class="price">$13.99</p>
      </div>
    </label>

    <div class="bundle-plus" aria-hidden="true">+</div>

    <!-- Book 3 -->
    <label class="bundle-item">
      <input type="checkbox" name="bundle" value="bk-05" checked aria-label="Include Maps of the Vanishing">
      <div class="w-24 rounded overflow-hidden"><div class="cover-art cover-5" style="aspect-ratio:2/3"></div></div>
      <div class="bundle-item-info">
        <p class="bundle-item-title">Maps of the Vanishing</p>
        <p class="bundle-item-author">Yusuf Al-Rashid</p>
        <p class="price">$15.50</p>
      </div>
    </label>
  </div>

  <div class="bundle-total mt-6">
    <div>
      <p class="text-sm text-text-muted">3 items selected</p>
      <div class="flex items-center gap-3 mt-1">
        <span class="price text-2xl">$41.86</span>
        <span class="price-old">$52.48</span>
        <span class="badge badge-danger">Save 20%</span>
      </div>
    </div>
    <button class="btn btn-primary btn-lg" data-bundle-add-all>
      <svg aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg> Add all to cart
    </button>
  </div>
</section>
