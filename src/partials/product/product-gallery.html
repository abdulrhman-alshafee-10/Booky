<!-- ===== Product gallery ===== -->
<div class="product-gallery" data-product-gallery>
  <!-- Main cover -->
  <div class="product-gallery-main" id="gallery-main">
    <div class="cover-art cover-1 w-full" style="aspect-ratio:2/3" data-gallery-main-cover></div>
    <button class="product-gallery-zoom" data-gallery-zoom aria-label="Zoom cover image">
      <svg aria-hidden="true" focusable="false" style="width:1.25rem;height:1.25rem"><use href="#icon-zoom-in"></use></svg>
    </button>
  </div>
  <!-- Thumbnails -->
  <div class="product-thumbs" role="list" aria-label="Cover gallery thumbnails">
    <button class="product-thumb is-active" role="listitem" data-gallery-thumb="cover-1" aria-label="Cover variant 1" aria-pressed="true">
      <div class="cover-art cover-1 w-full" style="aspect-ratio:2/3"></div>
    </button>
    <button class="product-thumb" role="listitem" data-gallery-thumb="cover-2" aria-label="Cover variant 2" aria-pressed="false">
      <div class="cover-art cover-2 w-full" style="aspect-ratio:2/3"></div>
    </button>
    <button class="product-thumb" role="listitem" data-gallery-thumb="cover-3" aria-label="Cover variant 3" aria-pressed="false">
      <div class="cover-art cover-3 w-full" style="aspect-ratio:2/3"></div>
    </button>
  </div>
</div>

<!-- Gallery lightbox -->
<div class="gallery-lightbox-overlay" id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Cover image lightbox" hidden>
  <button class="gallery-lightbox-close" data-lb-close aria-label="Close lightbox">
    <svg aria-hidden="true" focusable="false" style="width:1.5rem;height:1.5rem"><use href="#icon-x"></use></svg>
  </button>
  <div class="gallery-lightbox-content" data-lb-content></div>
</div>
