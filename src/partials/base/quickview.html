<!-- ===== Quick view modal ===== -->
<div class="modal-overlay" id="quickview" role="dialog" aria-modal="true" aria-labelledby="qv-title-text">
  <div class="modal-box modal-lg">
    <button class="modal-close absolute end-3 top-3 z-10 bg-surface-2" data-modal-close aria-label="Close quick view">
      <svg aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
    </button>
    <div class="grid sm:grid-cols-2 gap-0">
      <!-- Cover -->
      <div class="bg-surface-3 flex items-center justify-center p-8 rounded-s-card">
        <div class="w-48 rounded-card overflow-hidden shadow-card-hover rotate-[-3deg]">
          <div class="cover-art cover-1" data-qv-cover></div>
        </div>
      </div>
      <!-- Details -->
      <div class="p-6 sm:p-8">
        <a href="product.html" class="book-card-category">Fiction</a>
        <h2 class="font-heading text-2xl font-bold text-text mt-1" id="qv-title-text">
          <span data-qv-title>—</span>
        </h2>
        <p class="text-sm text-text-muted mt-1" data-qv-author></p>
        <div class="mt-2" data-qv-rating></div>
        <p class="text-sm text-text-muted leading-relaxed mt-3 line-clamp-4" data-qv-desc>A carefully curated Booky selection. Click full details for the complete synopsis, reviews, and format options.</p>
        <div class="price-group mt-4">
          <span class="price text-2xl" data-qv-price>—</span>
        </div>
        <!-- Quantity + Add to cart -->
        <div class="flex items-center gap-3 mt-5">
          <div class="qty-stepper" role="group" aria-label="Quantity">
            <button class="qty-btn" data-qty-dec aria-label="Decrease quantity">
              <svg aria-hidden="true" focusable="false"><use href="#icon-minus"></use></svg>
            </button>
            <input class="qty-input" type="number" value="1" min="1" max="99" data-qty-input aria-label="Quantity">
            <button class="qty-btn" data-qty-inc aria-label="Increase quantity">
              <svg aria-hidden="true" focusable="false"><use href="#icon-plus"></use></svg>
            </button>
          </div>
          <button class="btn btn-primary flex-1" data-qv-add-cart>
            <svg aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg> Add to cart
          </button>
        </div>
        <input type="hidden" data-qv-id value="">
        <!-- Secondary actions -->
        <div class="flex items-center gap-4 mt-4 text-sm">
          <button class="inline-flex items-center gap-1.5 text-text-muted hover:text-primary" data-wishlist-toggle>
            <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-wishlist"></use></svg> Wishlist
          </button>
          <a href="product.html" class="inline-flex items-center gap-1.5 text-text-muted hover:text-primary" data-qv-link>
            <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-eye"></use></svg> Full details
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
