<!-- ============================================================
     SHOP SIDEBAR  (single instance — off-canvas drawer on mobile,
     static column on lg+ via .shop-filter-drawer CSS overrides).
     Opened on mobile by [data-drawer-open="filter-drawer"].
     All controls expose data-* hooks read by shop-filters.js.
============================================================ -->
<div class="drawer-overlay shop-filter-drawer" id="filter-drawer" role="dialog" aria-label="Filter books">
  <div class="drawer-panel drawer-panel-left shop-sidebar-col">

    <!-- Drawer header (mobile only) -->
    <div class="drawer-header">
      <h2 class="drawer-title">Filters</h2>
      <button class="btn btn-icon btn-ghost" type="button" data-drawer-close aria-label="Close filters">
        <svg aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
      </button>
    </div>

    <div class="drawer-body">
      <form class="shop-sidebar" data-shop-filters aria-label="Product filters">

        <!-- Search within results -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Search results</legend>
          <div class="input-group input-group-start">
            <span class="input-icon-start" aria-hidden="true">
              <svg focusable="false"><use href="#icon-search"></use></svg>
            </span>
            <label class="sr-only" for="filter-search">Search within results</label>
            <input class="input-field" type="search" id="filter-search" data-filter-search placeholder="Title or author…" autocomplete="off">
          </div>
        </fieldset>

        <!-- Categories / genres -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Genre</legend>
          <ul class="filter-list">
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Fiction"><span class="filter-option-label">Fiction</span><span class="filter-count">3</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Non-Fiction"><span class="filter-option-label">Non-Fiction</span><span class="filter-count">2</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Romance"><span class="filter-option-label">Romance</span><span class="filter-count">2</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Mystery"><span class="filter-option-label">Mystery</span><span class="filter-count">1</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Fantasy"><span class="filter-option-label">Fantasy</span><span class="filter-count">1</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Sci-Fi"><span class="filter-option-label">Science Fiction</span><span class="filter-count">1</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="genre" value="Poetry"><span class="filter-option-label">Poetry</span><span class="filter-count">2</span></label></li>
          </ul>
        </fieldset>

        <!-- Price range -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Price</legend>
          <div class="price-range" data-price-range data-min="0" data-max="30">
            <div class="price-range-rail" aria-hidden="true"></div>
            <div class="price-range-fill" data-price-fill aria-hidden="true"></div>
            <label class="sr-only" for="price-min-range">Minimum price</label>
            <input type="range" id="price-min-range" min="0" max="30" step="1" value="0" data-price-min>
            <label class="sr-only" for="price-max-range">Maximum price</label>
            <input type="range" id="price-max-range" min="0" max="30" step="1" value="30" data-price-max>
          </div>
          <div class="price-range-values">
            <div class="input-group input-group-start">
              <span class="input-icon-start" aria-hidden="true">$</span>
              <label class="sr-only" for="price-min-num">Minimum price (dollars)</label>
              <input class="input-field" type="number" id="price-min-num" min="0" max="30" value="0" data-price-min-num inputmode="numeric">
            </div>
            <span class="price-range-sep" aria-hidden="true">&ndash;</span>
            <div class="input-group input-group-start">
              <span class="input-icon-start" aria-hidden="true">$</span>
              <label class="sr-only" for="price-max-num">Maximum price (dollars)</label>
              <input class="input-field" type="number" id="price-max-num" min="0" max="30" value="30" data-price-max-num inputmode="numeric">
            </div>
          </div>
        </fieldset>

        <!-- Format -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Format</legend>
          <ul class="filter-list">
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="format" value="print"><span class="filter-option-label">Print</span><span class="filter-count">6</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="format" value="ebook"><span class="filter-option-label">eBook</span><span class="filter-count">2</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="format" value="audio"><span class="filter-option-label">Audiobook</span><span class="filter-count">2</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="format" value="bundle"><span class="filter-option-label">Bundle</span><span class="filter-count">2</span></label></li>
          </ul>
        </fieldset>

        <!-- Rating -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Customer rating</legend>
          <ul class="filter-list">
            <li><label class="filter-option"><input type="radio" class="radio-control" name="filter-rating" data-filter="rating" value="4"><span class="filter-option-label flex items-center gap-1"><span class="rating" aria-hidden="true"><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star"><use href="#icon-star"></use></svg></span> &amp; up</span></label></li>
            <li><label class="filter-option"><input type="radio" class="radio-control" name="filter-rating" data-filter="rating" value="3"><span class="filter-option-label flex items-center gap-1"><span class="rating" aria-hidden="true"><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star rating-star-filled"><use href="#icon-star-filled"></use></svg><svg class="rating-star"><use href="#icon-star"></use></svg><svg class="rating-star"><use href="#icon-star"></use></svg></span> &amp; up</span></label></li>
          </ul>
        </fieldset>

        <!-- Availability -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Availability</legend>
          <ul class="filter-list">
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="availability" value="in"><span class="filter-option-label">In stock</span><span class="filter-count">9</span></label></li>
            <li><label class="filter-option"><input type="checkbox" class="checkbox-control" data-filter="availability" value="pre"><span class="filter-option-label">Pre-order</span><span class="filter-count">2</span></label></li>
          </ul>
        </fieldset>

        <!-- Featured promo -->
        <div class="filter-promo">
          <p class="filter-promo-title">Reader's Club</p>
          <p class="text-sm opacity-90 mb-4">Members save 15% on every order, every day.</p>
          <a href="account-dashboard.html" class="btn btn-sm bg-surface text-text hover:bg-surface-3">Join free</a>
        </div>
      </form>
    </div>

    <!-- Drawer footer (mobile only) -->
    <div class="drawer-footer flex items-center gap-3">
      <button class="btn btn-outline btn-full" type="button" data-filter-clear>Clear all</button>
      <button class="btn btn-primary btn-full" type="button" data-drawer-close>Apply</button>
    </div>

  </div>
</div>
