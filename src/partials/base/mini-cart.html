<!-- ===== Mini-cart drawer ===== -->
<div class="drawer-overlay" id="mini-cart">
  <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="mini-cart-title">
    <div class="drawer-header">
      <h2 class="drawer-title" id="mini-cart-title">
        Your cart <span class="badge badge-primary badge-count ms-1" data-cart-count>0</span>
      </h2>
      <button class="modal-close" data-drawer-close aria-label="Close cart">
        <svg aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
      </button>
    </div>

    <!-- Empty state (shown when cart is empty) -->
    <div class="drawer-body flex flex-col items-center justify-center py-16 text-center" data-mc-empty>
      <svg class="w-16 h-16 text-text-muted mb-4 opacity-40" aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg>
      <p class="font-heading font-semibold text-lg">Your cart is empty</p>
      <p class="text-text-muted text-sm mt-1">Add some books to get started.</p>
      <a href="shop.html" class="btn btn-primary mt-6" data-drawer-close>Browse Books</a>
    </div>

    <!-- Filled state -->
    <div class="drawer-body overflow-y-auto" data-mc-body hidden></div>

    <div class="drawer-footer" data-mc-footer hidden>
      <div class="cart-summary border-0! pt-0!">
        <div class="cart-summary-row is-total">
          <span>Subtotal</span>
          <span class="font-bold" data-mc-subtotal>$0.00</span>
        </div>
      </div>
      <div class="flex flex-col gap-2 mt-3">
        <a href="checkout.html" class="btn btn-primary btn-full btn-lg">Checkout</a>
        <a href="cart.html" class="btn btn-outline btn-full">View cart</a>
      </div>
    </div>
  </div>
</div>
