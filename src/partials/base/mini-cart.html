<!-- ============================================================
     Mini-cart drawer — opened by [data-open="mini-cart"] and on add.
     Rendered by cart-ui.js; open/close/focus-trap by dialog.js.
============================================================ -->
<div class="overlay overlay-drawer" id="mini-cart" data-overlay role="dialog" aria-modal="true" aria-label="Your cart">
  <div class="overlay-backdrop" data-close></div>
  <aside class="drawer">
    <div class="drawer-head">
      <h2 class="text-xl">Your cart</h2>
      <button class="drawer-close" data-close aria-label="Close cart"><svg class="icon" aria-hidden="true"><use href="#i-x"></use></svg></button>
    </div>

    <div class="drawer-body" data-mc-body><!-- line items rendered here --></div>

    <div class="mc-empty" data-mc-empty hidden>
      <div class="empty-state">
        <svg class="icon" aria-hidden="true"><use href="#i-bag"></use></svg>
        <p class="empty-state-title">Your cart is empty</p>
        <p>Add a few titles and they'll appear here.</p>
        <button class="btn" data-close>Keep browsing</button>
      </div>
    </div>

    <div class="drawer-foot" data-mc-foot hidden>
      <div class="mc-subtotal">
        <span>Subtotal</span>
        <span class="price" data-mc-subtotal>$0.00</span>
      </div>
      <p class="text-xs text-ink-faint">Shipping &amp; taxes calculated at checkout.</p>
      <a class="btn btn-outline btn-block" href="cart.html">View cart</a>
      <a class="btn btn-block" href="checkout.html">Checkout</a>
    </div>
  </aside>
</div>
