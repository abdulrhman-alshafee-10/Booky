<!-- ===== Map Embed — License-safe OpenStreetMap iframe =====
     No API key required. ODbL license — attribution shown.
     Buyers: swap the src URL with a Google Maps Embed API URL,
     update LICENSES.md and remove the OSM attribution note.
===== -->
<div class="map-embed map-embed-ratio">
  <iframe
    src="https://www.openstreetmap.org/export/embed.html?bbox=-0.12%2C51.49%2C-0.09%2C51.51&amp;layer=mapnik"
    title="Booky flagship store location on OpenStreetMap"
    loading="lazy"
    referrerpolicy="no-referrer"
    allowfullscreen
  ></iframe>
  <!-- Fallback shown if iframe is blocked -->
  <noscript>
    <div class="map-embed-fallback">
      <svg class="w-10 h-10 text-text-muted" aria-hidden="true" focusable="false"><use href="#icon-map-pin"></use></svg>
      <p class="text-sm text-text-muted">Map unavailable.</p>
      <a href="https://www.openstreetmap.org/#map=16/51.50/-0.10" class="btn btn-outline btn-sm" target="_blank" rel="noopener">View on OpenStreetMap</a>
    </div>
  </noscript>
</div>
<p class="map-attribution">
  Map data &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors
</p>
