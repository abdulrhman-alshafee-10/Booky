<!-- ============================================================
     MOBILE SEARCH OVERLAY — shared across all headers
     Open: [data-search-open]   Close: [data-search-close]
============================================================ -->
<div class="modal-overlay" id="mobile-search" role="dialog" aria-modal="true" aria-label="Search">
  <div class="modal-box modal-sm" style="align-self:flex-start;margin-top:1rem;">
    <div class="p-4">

      <form role="search" action="shop.html" class="flex gap-2">
        <label for="mobile-search-input" class="sr-only">Search books</label>
        <div class="input-group flex-1">
          <span class="input-icon-start">
            <svg aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg>
          </span>
          <input
            id="mobile-search-input"
            type="search"
            name="q"
            class="input-field"
            placeholder="Search books, authors, ISBN…"
            autocomplete="off"
          >
        </div>
        <button type="button" class="btn btn-ghost btn-icon" data-search-close aria-label="Close search">
          <svg aria-hidden="true" focusable="false"><use href="#icon-x"></use></svg>
        </button>
      </form>

      <div class="mt-4">
        <p class="text-xs font-semibold uppercase tracking-wider text-text-subtle mb-2">Popular searches</p>
        <div class="flex flex-wrap gap-2">
          <a href="shop.html" class="chip">Mystery</a>
          <a href="shop.html" class="chip">New releases</a>
          <a href="shop.html" class="chip">Bestsellers</a>
          <a href="shop.html" class="chip">Children's</a>
          <a href="shop.html" class="chip">Biography</a>
          <a href="shop.html" class="chip">Poetry</a>
        </div>
      </div>

    </div>
  </div>
</div>
