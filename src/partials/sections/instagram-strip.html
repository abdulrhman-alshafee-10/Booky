<!-- ============================================================
     SECTION — Instagram / Social Strip
     6-tile gallery using Swiper for mobile scroll + follow CTA.
     data-swiper="instagram" — config in carousel.js.
     Tiles use cover-art gradients (no real images = license-safe).
============================================================ -->
<section class="section-y bg-surface" aria-labelledby="instagram-title">
  <div class="container-app">

    <!-- Header row -->
    <div class="section-header-row" data-reveal>
      <div>
        <span class="section-label">
          <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
          @booky.reads
        </span>
        <h2 id="instagram-title" class="section-title">Books in the wild</h2>
      </div>
      <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="btn btn-outline hidden sm:inline-flex">
        Follow us
        <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-arrow-right"></use></svg>
      </a>
    </div>

    <!-- Gallery — Swiper on mobile, grid on desktop -->
    <div class="swiper" data-swiper="instagram" aria-label="Instagram photo gallery">
      <div class="swiper-wrapper">

        <!-- Tile 1 -->
        <div class="swiper-slide">
          <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="instagram-tile" aria-label="View post on Instagram">
            <div class="cover-art cover-3 w-full h-full" aria-hidden="true"></div>
            <div class="instagram-tile-overlay" aria-hidden="true">
              <svg class="w-6 h-6 text-white" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
            </div>
          </a>
        </div>

        <!-- Tile 2 -->
        <div class="swiper-slide">
          <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="instagram-tile" aria-label="View post on Instagram">
            <div class="cover-art cover-7 w-full h-full" aria-hidden="true"></div>
            <div class="instagram-tile-overlay" aria-hidden="true">
              <svg class="w-6 h-6 text-white" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
            </div>
          </a>
        </div>

        <!-- Tile 3 (tall feature tile in grid) -->
        <div class="swiper-slide">
          <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="instagram-tile" aria-label="View post on Instagram">
            <div class="cover-art cover-1 w-full h-full" aria-hidden="true"></div>
            <div class="instagram-tile-overlay" aria-hidden="true">
              <svg class="w-6 h-6 text-white" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
            </div>
          </a>
        </div>

        <!-- Tile 4 -->
        <div class="swiper-slide">
          <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="instagram-tile" aria-label="View post on Instagram">
            <div class="cover-art cover-5 w-full h-full" aria-hidden="true"></div>
            <div class="instagram-tile-overlay" aria-hidden="true">
              <svg class="w-6 h-6 text-white" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
            </div>
          </a>
        </div>

        <!-- Tile 5 -->
        <div class="swiper-slide">
          <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="instagram-tile" aria-label="View post on Instagram">
            <div class="cover-art cover-6 w-full h-full" aria-hidden="true"></div>
            <div class="instagram-tile-overlay" aria-hidden="true">
              <svg class="w-6 h-6 text-white" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
            </div>
          </a>
        </div>

        <!-- Tile 6 — CTA tile -->
        <div class="swiper-slide">
          <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="instagram-tile bg-surface-inverse flex flex-col items-center justify-center gap-3 text-center p-6" aria-label="Follow Booky on Instagram">
            <svg class="w-8 h-8 text-primary" aria-hidden="true" focusable="false"><use href="#icon-instagram"></use></svg>
            <p class="text-sm font-semibold text-white">@booky.reads</p>
            <p class="text-xs text-white/50">48.2k followers</p>
            <span class="btn btn-primary btn-sm mt-1">Follow us</span>
          </a>
        </div>

      </div>
    </div>

    <!-- Mobile follow CTA -->
    <div class="mt-6 text-center sm:hidden" data-reveal>
      <a href="https://instagram.com" rel="noopener noreferrer" target="_blank" class="btn btn-outline">Follow @booky.reads</a>
    </div>

  </div>
</section>
