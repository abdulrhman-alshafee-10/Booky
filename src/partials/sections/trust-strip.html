<!-- S29 — Trust & benefits strip. Four icons, hairline-separated. Tokens
     flip automatically under data-theme="dark", so this markup serves both
     light and dark demos. Placed before the footer on commerce demos. -->
<section class="section section--slim" aria-label="Why shop with Booky">
  <div class="container-main">
    <div class="trust-strip">
      <div class="trust-item">
        <svg class="icon" aria-hidden="true"><use href="#i-truck"></use></svg>
        <div>
          <p class="trust-title">Free shipping</p>
          <p class="trust-desc">On every order over $35, worldwide.</p>
        </div>
      </div>
      <div class="trust-item">
        <svg class="icon" aria-hidden="true"><use href="#i-shield"></use></svg>
        <div>
          <p class="trust-title">Secure checkout</p>
          <p class="trust-desc">Encrypted payments you can trust.</p>
        </div>
      </div>
      <div class="trust-item">
        <svg class="icon" aria-hidden="true"><use href="#i-refresh"></use></svg>
        <div>
          <p class="trust-title">Easy returns</p>
          <p class="trust-desc">30 days, no questions asked.</p>
        </div>
      </div>
      <div class="trust-item">
        <svg class="icon" aria-hidden="true"><use href="#i-mail"></use></svg>
        <div>
          <p class="trust-title">Reader support</p>
          <p class="trust-desc">Real booksellers, six days a week.</p>
        </div>
      </div>
    </div>
  </div>
</section>
