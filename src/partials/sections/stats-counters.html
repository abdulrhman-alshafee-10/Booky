<!-- S11 — Stats counters. Four serif numbers + small-caps labels, hairline
     separators. data-count is the target for the Phase 16 count-up; the
     final number is shown statically so it never depends on JS. -->
<section class="section" aria-labelledby="s11-title">
  <div class="container-main">
    <h2 id="s11-title" class="sr-only">Booky by the numbers</h2>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num" data-count="12000">12,000</span>
        <span class="stat-label">Titles in stock</span>
      </div>
      <div class="stat">
        <span class="stat-num" data-count="48000">48,000</span>
        <span class="stat-label">Books shipped</span>
      </div>
      <div class="stat">
        <span class="stat-num" data-count="320">320</span>
        <span class="stat-label">Authors hosted</span>
      </div>
      <div class="stat">
        <span class="stat-num" data-count="19">19</span>
        <span class="stat-label">Years on the high street</span>
      </div>
    </div>
  </div>
</section>
