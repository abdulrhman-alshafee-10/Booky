<!-- S7 — Newsletter band. Greige split: serif heading left, inline email
     form right (validated + success toast via forms.js). -->
<section class="section section-deep" aria-labelledby="s7-title">
  <div class="container-main">
    <div class="newsletter-grid">
      <div>
        <span class="overline">Reading, delivered</span>
        <h2 id="s7-title">Subscribe to our newsletter</h2>
      </div>
      <div>
        <p>One thoughtful email a week — new arrivals, staff picks, and the occasional essay. No noise.</p>
        <form data-newsletter class="mt-6">
          <div class="field">
            <div class="newsletter-inline">
              <label class="sr-only" for="s7-email">Email address</label>
              <input id="s7-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
              <button class="btn-link" type="submit">Send <svg class="icon icon-sm" aria-hidden="true"><use href="#i-arrow-right"></use></svg></button>
            </div>
          </div>
          <p class="form-foot">No spam. Unsubscribe in one click, any time.</p>
        </form>
      </div>
    </div>
  </div>
</section>
