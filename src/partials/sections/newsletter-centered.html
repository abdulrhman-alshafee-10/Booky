<!-- S7-B — Newsletter (centered, incentive). Overline + serif heading + lead +
     centered boxed form. Validated + success toast via forms.js. -->
<section class="section" aria-labelledby="s7b-title">
  <div class="container-narrow text-center">
    <span class="overline">Reading, delivered</span>
    <h2 id="s7b-title" class="mt-3">Get 10% off your first order</h2>
    <p class="mx-auto mt-4 max-w-prose">Join the list for new arrivals, staff picks, and the occasional essay — and we'll send a code for 10% off your first parcel.</p>
    <form data-newsletter class="newsletter-center mt-8">
      <div class="field">
        <div class="newsletter-boxed">
          <label class="sr-only" for="s7b-email">Email address</label>
          <input class="input" id="s7b-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
          <button class="btn" type="submit">Subscribe</button>
        </div>
      </div>
      <p class="form-foot">No spam. Unsubscribe in one click, any time.</p>
    </form>
  </div>
</section>
