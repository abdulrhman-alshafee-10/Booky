<!-- ===== Newsletter ===== -->
<section class="section-y" aria-labelledby="news-title" data-reveal>
  <div class="container-app">
    <div class="relative overflow-hidden rounded-2xl bg-primary text-white px-6 py-12 sm:p-14 text-center">
      <span class="blob w-80 h-80 -top-24 -start-16 bg-white/30" aria-hidden="true"></span>
      <span class="blob w-80 h-80 -bottom-28 -end-10 bg-accent" aria-hidden="true"></span>

      <div class="relative z-10 max-w-xl mx-auto">
        <span class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-white/15 mb-5">
          <svg class="w-6 h-6" aria-hidden="true" focusable="false"><use href="#icon-mail"></use></svg>
        </span>
        <h2 class="font-heading text-3xl sm:text-4xl font-bold" id="news-title">Get 10% off your first order</h2>
        <p class="mt-3 opacity-90 leading-relaxed">Subscribe for handpicked recommendations, early access to sales, and exclusive member offers. No spam, unsubscribe anytime.</p>

        <form class="mt-7 flex flex-col sm:flex-row gap-3 max-w-md mx-auto" data-newsletter novalidate>
          <label for="newsletter-email" class="sr-only">Email address</label>
          <input id="newsletter-email" type="email" name="email" required
                 class="flex-1 rounded-input border-0 px-4 py-3 text-text bg-white placeholder:text-text-subtle focus:outline-none focus:ring-3 focus:ring-white/40"
                 placeholder="you@example.com" autocomplete="email">
          <button type="submit" class="btn btn-lg bg-neutral-900 text-white hover:bg-neutral-800 shrink-0">Subscribe</button>
        </form>
        <p class="text-xs opacity-70 mt-3" data-newsletter-msg role="status" aria-live="polite">We respect your privacy.</p>
      </div>
    </div>
  </div>
</section>
