<!-- ============================================================
     SECTION — Quote + CTA Band
     Editorial pull-quote with author attribution, brand accent,
     and a strong CTA. Surface-inverse for impact.
============================================================ -->
<section class="quote-band" aria-label="Quote and call to action">
  <div class="container-app">

    <div class="max-w-4xl mx-auto text-center" data-reveal>

      <!-- Decorative quote mark -->
      <div class="flex justify-center mb-6" aria-hidden="true">
        <svg class="w-14 h-14 text-primary/30" viewBox="0 0 56 56" fill="currentColor">
          <path d="M10 34c0-8.837 5.82-16 14-18l2 4c-5.4 1.5-8 5.5-8 10h6v10H10V34zm22 0c0-8.837 5.82-16 14-18l2 4c-5.4 1.5-8 5.5-8 10h6v10H32V34z"/>
        </svg>
      </div>

      <!-- Quote -->
      <blockquote class="font-heading text-3xl sm:text-4xl lg:text-5xl font-black leading-tight text-white mb-8">
        "A great book is a friend that never leaves you — it lives in the margins of your memory forever."
      </blockquote>

      <!-- Attribution -->
      <div class="flex items-center justify-center gap-3 mb-10">
        <div class="w-10 h-10 rounded-full overflow-hidden shrink-0">
          <div class="cover-art cover-3 h-full" aria-hidden="true"></div>
        </div>
        <div class="text-start">
          <p class="text-sm font-semibold text-white">Eleanor Finch</p>
          <p class="text-xs text-white/50">Author of <em>The Lantern of Aldridge Bay</em></p>
        </div>
      </div>

      <!-- CTA row -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <a href="shop.html" class="btn btn-primary">Start reading for free</a>
        <a href="shop.html" class="btn btn-ghost text-white/70 hover:text-white">Browse 50,000+ books</a>
      </div>

      <!-- Trust strip -->
      <div class="mt-10 flex flex-wrap items-center justify-center gap-6 text-white/40 text-xs" aria-label="Trust indicators">
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-check-circle"></use></svg>
          No subscription required
        </span>
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-check-circle"></use></svg>
          DRM-free downloads
        </span>
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-check-circle"></use></svg>
          Lifetime access
        </span>
      </div>

    </div>

  </div>
</section>
