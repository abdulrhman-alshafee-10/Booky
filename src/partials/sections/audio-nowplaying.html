<!-- ===== Audio Now-Playing Strip (Audiobook signature block) =====
     Decorative — no real audio. CSS waveform, reduced-motion safe.
===== -->
<section class="audio-nowplaying" aria-label="Continue listening">
  <div class="container-app">
    <div class="audio-nowplaying-inner">

      <!-- Cover -->
      <div class="audio-cover" aria-hidden="true">
        <div class="cover-art cover-4 h-full">
          <span class="cover-art-publisher">Booky Audio</span>
          <div><hr class="cover-art-rule"><p class="cover-art-title">Echoes of the Deep</p><p class="cover-art-author">Narrated by Lena Voss</p></div>
        </div>
      </div>

      <!-- Info + Controls -->
      <div class="audio-info">
        <p class="audio-label">Continue Listening</p>
        <p class="audio-title">Echoes of the Deep</p>
        <p class="audio-author">Marcus Hale &nbsp;&middot;&nbsp; Narrated by Lena Voss</p>

        <!-- Waveform (decorative, aria-hidden) -->
        <div class="audio-waveform" aria-hidden="true">
          <span class="audio-bar is-active" style="height:0.75rem"></span>
          <span class="audio-bar" style="height:1.25rem"></span>
          <span class="audio-bar is-active" style="height:1.875rem"></span>
          <span class="audio-bar" style="height:1rem"></span>
          <span class="audio-bar is-active" style="height:2rem"></span>
          <span class="audio-bar" style="height:1.375rem"></span>
          <span class="audio-bar is-active" style="height:0.875rem"></span>
          <span class="audio-bar" style="height:1.625rem"></span>
          <span class="audio-bar is-active" style="height:2.125rem"></span>
          <span class="audio-bar" style="height:0.75rem"></span>
          <span class="audio-bar is-active" style="height:1.5rem"></span>
          <span class="audio-bar" style="height:1.125rem"></span>
          <span class="audio-bar is-active" style="height:1.75rem"></span>
          <span class="audio-bar" style="height:0.875rem"></span>
          <span class="audio-bar is-active" style="height:1.375rem"></span>
          <span class="audio-bar" style="height:2rem"></span>
          <span class="audio-bar is-active" style="height:1.25rem"></span>
          <span class="audio-bar" style="height:0.75rem"></span>
          <span class="audio-bar is-active" style="height:1.875rem"></span>
          <span class="audio-bar" style="height:1rem"></span>
        </div>

        <!-- Progress bar -->
        <div class="audio-progress" aria-label="Playback progress: 38%">
          <span style="width:38%" aria-hidden="true"></span>
        </div>
      </div>

      <!-- Playback controls -->
      <div class="audio-controls" role="group" aria-label="Playback controls">
        <button type="button" class="audio-btn" aria-label="Rewind 30 seconds">
          <svg aria-hidden="true" focusable="false"><use href="#icon-arrow-left"></use></svg>
        </button>
        <button type="button" class="audio-btn audio-btn-play" aria-label="Play Echoes of the Deep" data-audio-toggle>
          <svg aria-hidden="true" focusable="false"><use href="#icon-play"></use></svg>
        </button>
        <button type="button" class="audio-btn" aria-label="Skip 30 seconds">
          <svg aria-hidden="true" focusable="false"><use href="#icon-arrow-right"></use></svg>
        </button>
        <a href="product.html" class="btn btn-outline btn-sm ms-2 text-text-on-dark border-current hover:bg-white/10">
          View book
        </a>
      </div>

    </div>
  </div>
</section>
