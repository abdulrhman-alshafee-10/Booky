<!-- S7-D — Newsletter (ink band). Dark band (reuses .cta-band fill), centered
     copy + boxed form. Excluded from auto-banding via .cta-band. -->
<section class="section cta-band newsletter-ink" aria-labelledby="s7d-title">
  <div class="container-main">
    <span class="overline">Stay in the loop</span>
    <h2 id="s7d-title">Subscribe to our newsletter</h2>
    <p>One thoughtful email a week — new arrivals, staff picks, and the occasional essay.</p>
    <form data-newsletter class="newsletter-center mt-8">
      <div class="field">
        <div class="newsletter-boxed">
          <label class="sr-only" for="s7d-email">Email address</label>
          <input class="input" id="s7d-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
          <button class="btn" type="submit">Subscribe</button>
        </div>
      </div>
      <p class="form-foot">No spam. Unsubscribe any time.</p>
    </form>
  </div>
</section>
