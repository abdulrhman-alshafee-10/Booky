<!-- S7-C — Newsletter (card with image). Rounded surface card: copy + boxed
     form on one side, a reading photo on the other. -->
<section class="section" aria-labelledby="s7c-title">
  <div class="container-main">
    <div class="newsletter-card">
      <div class="newsletter-card-body">
        <span class="overline">Reading, delivered</span>
        <h2 id="s7c-title">Subscribe to our newsletter</h2>
        <p>One thoughtful email a week — new arrivals, staff picks, and the occasional essay. No noise.</p>
        <form data-newsletter class="mt-6">
          <div class="field">
            <div class="newsletter-boxed">
              <label class="sr-only" for="s7c-email">Email address</label>
              <input class="input" id="s7c-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
              <button class="btn" type="submit">Subscribe</button>
            </div>
          </div>
          <p class="form-foot">No spam. Unsubscribe in one click, any time.</p>
        </form>
      </div>
      <div class="newsletter-card-media">
        <img src="assets/images/photos/reading-coffee.jpg" alt="An open book beside a cup of coffee and reading glasses" width="1000" height="750" loading="lazy" decoding="async">
      </div>
    </div>
  </div>
</section>
