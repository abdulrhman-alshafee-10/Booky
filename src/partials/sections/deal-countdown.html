<!-- S28 — Deal countdown. Greige split: offer copy + live countdown left,
     floating cover right. Timer driven by countdown.js (data-hours). -->
<section class="section section-deep" aria-labelledby="s28-title">
  <div class="container-main">
    <div class="deal-grid">
      <div class="deal-body">
        <span class="overline">Deal of the week</span>
        <h2 id="s28-title">48 hours only — Salt &amp; Starlight</h2>
        <p>Marina Vøllo's tide-swept epic, at its lowest price of the year. When the clock runs out, the offer sails with it.</p>
        <div class="price-group">
          <span class="price-sale">$12.50</span>
          <span class="price-old">$18.50</span>
        </div>
        <div class="countdown mt-8" data-countdown data-hours="48" role="timer" aria-label="Time remaining on this deal">
          <div class="cd-cell"><span class="cd-num" data-cd="days">00</span><span class="cd-label">Days</span></div>
          <div class="cd-cell"><span class="cd-num" data-cd="hours">00</span><span class="cd-label">Hours</span></div>
          <div class="cd-cell"><span class="cd-num" data-cd="mins">00</span><span class="cd-label">Mins</span></div>
          <div class="cd-cell"><span class="cd-num" data-cd="secs">00</span><span class="cd-label">Secs</span></div>
        </div>
        <a class="btn" href="product.html">Grab the deal</a>
      </div>
      <div class="bestseller-cover-wrap">
        <img class="bestseller-cover" src="assets/images/covers/salt-and-starlight.jpg" alt="Salt and Starlight by Marina Vøllo — book cover" width="600" height="900" loading="lazy" decoding="async">
      </div>
    </div>
  </div>
</section>
