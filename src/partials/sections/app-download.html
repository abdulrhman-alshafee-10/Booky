<!-- S9 — App download band. Greige: phone mockup left, copy + store badges
     right. Badges are generic in-palette links (no trademarked lockups). -->
<section class="section section-deep" aria-labelledby="s9-title">
  <div class="container-main">
    <div class="app-grid">
      <div>
        <img class="phone-mockup" src="assets/images/graphics/phone-mockup.svg" alt="The Booky reading app showing a book in progress" width="320" height="600" loading="lazy" decoding="async">
      </div>
      <div class="app-body">
        <span class="overline">Take the shelf with you</span>
        <h2 id="s9-title">Your library, in your pocket</h2>
        <p>Sync your wishlist, track what you're reading, and pick up exactly where you left off. The Booky app keeps every shelf in step across your devices.</p>
        <div class="store-badges">
          <a class="store-badge" href="#">
            <svg class="icon" aria-hidden="true"><use href="#i-book"></use></svg>
            <span><span class="store-badge-small">Download for</span><span class="store-badge-name">iPhone &amp; iPad</span></span>
          </a>
          <a class="store-badge" href="#">
            <svg class="icon" aria-hidden="true"><use href="#i-book"></use></svg>
            <span><span class="store-badge-small">Get it for</span><span class="store-badge-name">Android</span></span>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
