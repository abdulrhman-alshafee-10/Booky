<!-- ===== Promo banners (2-up) ===== -->
<section class="section-y !pt-0" aria-label="Featured promotions" data-reveal>
  <div class="container-app">
    <div class="grid md:grid-cols-2 gap-5">
      <!-- Audiobooks -->
      <article class="relative overflow-hidden rounded-2xl cover-7 text-white p-8 sm:p-10 min-h-56 flex flex-col justify-center">
        <span class="blob w-64 h-64 -bottom-20 -end-10 bg-white/30" aria-hidden="true"></span>
        <div class="relative z-10 max-w-xs">
          <span class="badge bg-white/20 text-white mb-3">New</span>
          <h3 class="font-heading text-2xl sm:text-3xl font-bold leading-tight">Listen anywhere with audiobooks</h3>
          <p class="mt-2 text-sm opacity-90">Over 8,000 titles narrated by award-winning voices.</p>
          <a href="shop.html" class="btn bg-white text-neutral-900 hover:bg-neutral-100 mt-5 w-fit">
            Explore audiobooks
            <svg aria-hidden="true" focusable="false"><use href="#icon-arrow-right"></use></svg>
          </a>
        </div>
      </article>

      <!-- Gift cards -->
      <article class="relative overflow-hidden rounded-2xl cover-4 text-white p-8 sm:p-10 min-h-56 flex flex-col justify-center">
        <span class="blob w-64 h-64 -top-20 -start-10 bg-white/30" aria-hidden="true"></span>
        <div class="relative z-10 max-w-xs">
          <span class="badge bg-white/20 text-white mb-3">Perfect gift</span>
          <h3 class="font-heading text-2xl sm:text-3xl font-bold leading-tight">Give the gift of reading</h3>
          <p class="mt-2 text-sm opacity-90">Digital gift cards delivered instantly, from $10.</p>
          <a href="shop.html" class="btn bg-white text-neutral-900 hover:bg-neutral-100 mt-5 w-fit">
            Buy a gift card
            <svg aria-hidden="true" focusable="false"><use href="#icon-arrow-right"></use></svg>
          </a>
        </div>
      </article>
    </div>
  </div>
</section>
