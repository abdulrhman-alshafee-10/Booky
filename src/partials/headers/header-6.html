<!-- ============================================================
     HEADER 6 — Minimal / Off-Canvas (boutique)
     Ultra-minimal single row: hamburger (always) · centered logo · search + cart
     Primary navigation lives entirely in an elegant off-canvas panel.
     Pairs with: hero-editorial, hero-minimal, author / poetry / rare-books demos
============================================================ -->
<header class="site-header" id="site-header" data-header>

  <!-- ── Minimal single row ──────────────────────────────────── -->
  <div class="header-main !py-5">
    <div class="container-app">
      <div class="flex items-center justify-between">

        <!-- Start: hamburger (always visible, even on desktop) -->
        <button
          class="header-action -ms-2"
          data-mobile-nav-open
          aria-label="Open menu"
          aria-controls="mobile-nav"
          aria-expanded="false"
        >
          <svg aria-hidden="true" focusable="false"><use href="#icon-menu"></use></svg>
        </button>

        <!-- Center: Logo (absolute-center for visual balance) -->
        <a href="index.html" class="flex items-center gap-2.5 shrink-0" aria-label="Booky home">
          <span class="flex items-center justify-center w-8 h-8 rounded-md bg-primary text-white">
            <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-book"></use></svg>
          </span>
          <span class="font-heading text-2xl font-bold tracking-tight text-text">Booky</span>
        </a>

        <!-- End: search + cart only -->
        <div class="flex items-center gap-0.5">
          <button class="header-action" data-search-open aria-label="Search">
            <svg aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg>
          </button>
          <button class="header-action" data-cart-open aria-label="Cart, 2 items" aria-haspopup="dialog">
            <svg aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg>
            <span class="header-action-count" data-cart-count>2</span>
          </button>
        </div>

      </div>
    </div>
  </div>

</header>

<include src="base/mobile-search.html"></include>

<!-- ── Boutique off-canvas (richer editorial panel) ─────────── -->

          </li>

          </li>
        </ul>
      </nav>

      <!-- Boutique featured promo -->
      <div class="mt-8">
        <div class="rounded-card overflow-hidden cover-5 p-6 text-white">
          <p class="text-xs font-semibold uppercase tracking-widest opacity-70 mb-3">Now available</p>
          <p class="font-heading text-xl font-bold leading-snug">The Ember Cartographer</p>
