<!-- ============================================================
     HEADER 4 — Sticky Condensed (utility-first)
     Single compact row always: logo · prominent search · nav dropdown · actions
     No announcement bar · no separate nav row — nav in a "Browse" dropdown
     Pairs with: hero-search, hero-deal, marketplace / shop demos
============================================================ -->
<header class="site-header" id="site-header" data-header>

  <!-- ── Single always-visible main bar ──────────────────────── -->
  <div class="header-main">
    <div class="container-app">
      <div class="flex items-center gap-3 md:gap-4">

        <!-- Mobile menu trigger -->
        <button class="header-action lg:hidden -ms-2 shrink-0" data-mobile-nav-open aria-label="Open menu" aria-controls="mobile-nav" aria-expanded="false">
          <svg aria-hidden="true" focusable="false"><use href="#icon-menu"></use></svg>
        </button>

        <!-- Logo (compact) -->
        <a href="index.html" class="flex items-center gap-2 shrink-0" aria-label="Booky home">
          <span class="flex items-center justify-center w-9 h-9 rounded-lg bg-primary text-white">
            <svg class="w-5 h-5" aria-hidden="true" focusable="false"><use href="#icon-book"></use></svg>
          </span>
          <span class="font-heading text-xl font-bold tracking-tight text-text hidden sm:block">Booky</span>
        </a>

        <!-- Browse dropdown (desktop) -->
        <div class="dropdown hidden lg:block shrink-0">
          <button class="btn btn-outline btn-sm gap-2 font-semibold" data-dropdown-trigger aria-expanded="false" aria-haspopup="true">
            <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-menu"></use></svg>
            Browse
            <svg class="w-3.5 h-3.5" aria-hidden="true" focusable="false"><use href="#icon-chevron-down"></use></svg>
          </button>
          <ul class="dropdown-menu w-56" role="menu">
            <li><a href="shop.html" class="dropdown-item" role="menuitem">
              <svg aria-hidden="true" focusable="false"><use href="#icon-book"></use></svg> All Books
            </a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">
              <svg aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg> New Arrivals
            </a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">
              <svg aria-hidden="true" focusable="false"><use href="#icon-bookmark"></use></svg> Bestsellers
            </a></li>
            <li class="dropdown-divider" role="separator"></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">Fiction</a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">Non-Fiction</a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">Children's Books</a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">Mystery &amp; Thriller</a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">Science Fiction</a></li>
            <li><a href="shop.html" class="dropdown-item" role="menuitem">Poetry &amp; Essays</a></li>
            <li class="dropdown-divider" role="separator"></li>
            <li><a href="pricing.html" class="dropdown-item text-primary font-semibold" role="menuitem">
              <svg aria-hidden="true" focusable="false"><use href="#icon-star"></use></svg> Membership
            </a></li>
          </ul>
        </div>

        <!-- Prominent search — full-width center piece -->
        <form class="flex flex-1 min-w-0" role="search" data-header-search action="shop.html">
          <label for="h4-search" class="sr-only">Search books, authors, ISBN</label>
          <div class="flex w-full rounded-input border-[1.5px] border-border focus-within:border-primary focus-within:ring-3 focus-within:ring-[color:var(--color-focus-ring)] transition-colors overflow-hidden bg-surface-2">
            <!-- Category filter — desktop only -->
            <select class="hidden xl:block border-0 bg-surface-3 text-sm text-text-muted ps-3 pe-8 focus:outline-none cursor-pointer shrink-0" aria-label="Filter by category">
              <option>All Books</option>
              <option>Fiction</option>
              <option>Non-Fiction</option>
              <option>Children's</option>
              <option>Mystery</option>
              <option>Sci-Fi</option>
            </select>
            <input
              id="h4-search"
              type="search"
              name="q"
              placeholder="Search titles, authors, ISBN…"
              class="flex-1 min-w-0 border-0 bg-transparent px-3 py-2.5 text-sm text-text placeholder:text-text-subtle focus:outline-none"
              autocomplete="off"
            >
            <button type="submit" class="flex items-center justify-center px-4 bg-primary text-white hover:bg-primary-hover transition-colors shrink-0" aria-label="Search">
              <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg>
            </button>
          </div>
        </form>

        <!-- Secondary nav links (desktop, compact) -->
        <nav class="hidden xl:flex items-center gap-1 shrink-0" aria-label="Quick links">
          <a href="blog.html" class="nav-link !py-1.5 text-xs">Journal</a>
          <a href="contact.html" class="nav-link !py-1.5 text-xs">Help</a>
        </nav>

        <!-- Mobile search trigger -->
        <button class="header-action md:hidden shrink-0" data-search-open aria-label="Search">
          <svg aria-hidden="true" focusable="false"><use href="#icon-search"></use></svg>
        </button>

        <!-- Actions -->
        <div class="flex items-center gap-0.5 shrink-0">
          <a href="account.html" class="header-action hidden sm:inline-flex" aria-label="My account">
            <svg aria-hidden="true" focusable="false"><use href="#icon-user"></use></svg>
          </a>
          <a href="wishlist.html" class="header-action hidden sm:inline-flex" aria-label="Wishlist, 3 items">
            <svg aria-hidden="true" focusable="false"><use href="#icon-wishlist"></use></svg>
            <span class="header-action-count" data-wishlist-count>3</span>
          </a>
          <button class="header-action" data-cart-open aria-label="Cart, 2 items" aria-haspopup="dialog">
            <svg aria-hidden="true" focusable="false"><use href="#icon-cart"></use></svg>
            <span class="header-action-count" data-cart-count>2</span>
          </button>
        </div>

      </div>
    </div>
  </div>

</header>

<include src="base/mobile-search.html"></include>
<include src="base/mobile-nav.html"></include>
