<!-- ============================================================
     HERO — Video / Parallax (immersive)
     Full-bleed muted looping video with poster fallback (poster = LCP).
     Decorative video is aria-hidden. Static under reduced-motion.
     [data-hero-dark] signals header-3 to stay transparent until scroll.
     Pairs with: header-3 (transparent) · audiobook / cinematic demos
============================================================ -->
<section
  class="relative overflow-hidden min-h-[85dvh] flex items-center"
  aria-labelledby="hero-video-title"
  data-hero
  data-hero-dark
>

  <!-- ── Video background (decorative, aria-hidden) ───────── -->
  <div class="absolute inset-0 z-0" aria-hidden="true">
    <!--
      poster = LCP candidate (eager, dimensioned, shown immediately).
      video autoplays only in JS if !prefersReducedMotion and not mobile.
      The `data-video-bg` attribute is picked up by media.js.
    -->
    <img
      src="assets/images/placeholder-hero-poster.jpg"
      alt=""
      width="1440"
      height="810"
      class="w-full h-full object-cover object-center"
      fetchpriority="high"
      loading="eager"
      decoding="async"
    >
    <video
      class="absolute inset-0 w-full h-full object-cover object-center hidden"
      data-video-bg
      muted
      loop
      playsinline
      preload="none"
      aria-hidden="true"
      tabindex="-1"
    >
      <!-- Replace src with your video; poster shown until video plays -->
      <source src="assets/images/placeholder-hero.mp4" type="video/mp4">
    </video>

    <!-- Scrim overlay for text legibility -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/55"></div>
    <!-- Extra left vignette for desktop text panel -->
    <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-transparent hidden lg:block"></div>
  </div>

  <!-- ── Content ──────────────────────────────────────────── -->
  <div class="container-app relative z-10 w-full">
    <div class="max-w-2xl py-24 lg:py-32">

      <span class="section-label !text-white/80 !mb-5" data-reveal>
        <svg class="w-4 h-4" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
        Now in audiobook &middot; Narrated by the author
      </span>

      <h1
        id="hero-video-title"
        class="font-heading font-bold leading-[1.05] tracking-tight text-white"
        style="font-size:clamp(2.8rem,5.5vw,4.5rem)"
        data-reveal
      >
        Stories that move you.<br>
        <em class="not-italic text-primary-light">Every single day.</em>
      </h1>

      <p class="mt-6 text-xl text-white/80 leading-relaxed max-w-xl text-pretty" data-reveal>
        Thousands of audiobooks and ebooks — listen anywhere, read everywhere. Your next great story is waiting.
      </p>

      <div class="mt-8 flex flex-wrap items-center gap-3" data-reveal>
        <a href="shop.html" class="btn btn-primary btn-lg">Start listening free</a>
        <a href="shop.html" class="btn bg-white/15 hover:bg-white/25 text-white border border-white/30 backdrop-blur-sm btn-lg">Browse catalogue →</a>
      </div>

      <!-- Trust signals -->
      <div class="mt-8 flex flex-wrap items-center gap-5 text-sm text-white/70" data-reveal>
        <div class="flex items-center gap-2">
          <div class="rating" aria-label="Rated 4.8 of 5">
            <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
            <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
            <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
            <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
            <svg class="rating-star rating-star-filled" aria-hidden="true" focusable="false"><use href="#icon-star-filled"></use></svg>
          </div>
          <span><strong class="text-white">4.8</strong> · 50k+ listeners</span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-success shrink-0" aria-hidden="true" focusable="false"><use href="#icon-check-circle"></use></svg>
          Cancel anytime
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-success shrink-0" aria-hidden="true" focusable="false"><use href="#icon-check-circle"></use></svg>
          First month free
        </div>
      </div>

    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 inset-x-0 flex justify-center z-10 animate-bounce" aria-hidden="true">
    <svg class="w-6 h-6 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>

</section>
