<!-- H2 — Centered statement. Overline · huge serif line · search field +
     popular tag chips. For library / minimal demos. -->
<section class="hero hero-centered" aria-labelledby="hero-centered-title">
  <div class="container-narrow">
    <span class="overline">A bookshop for slow readers</span>
    <h1 class="display" id="hero-centered-title">What are you reading next?</h1>
    <p class="hero-lead">Twelve thousand hand-picked titles, one quiet recommendation engine, and free shipping on everything over $30.</p>
    <form class="hero-actions" role="search" action="shop-left.html" method="get">
      <label class="sr-only" for="hero-search">Search the catalogue</label>

        <input class="input" id="hero-search" name="q" type="search" placeholder="Search by title, author or genre" autocomplete="off">
      </div>
      <button class="btn" type="submit">Search</button>
    </form>
    <div class="hero-tags">
      <a class="chip" href="shop-left.html">Literary fiction</a>
      <a class="chip" href="shop-left.html">Poetry</a>
      <a class="chip" href="shop-left.html">Nature writing</a>

    </div>
  </div>
